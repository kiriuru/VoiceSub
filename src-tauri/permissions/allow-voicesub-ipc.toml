[[permission]]
identifier = "allow-voicesub-ipc"
description = "Main dashboard shell IPC — token, snapshot, layout, module windows, allowlisted URLs."
commands.allow = [
  "get_loopback_api_token",
  "get_runtime_state_snapshot",
  "set_dashboard_layout",
  "tts_open_window",
  "local_asr_open_window",
  "open_external_https_url",
  "open_local_http_url",
]
